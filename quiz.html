<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leipzig Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: #fef9f0;
    min-height: 100vh;
    padding: 20px;
  }

  h1 {
    text-align: center;
    font-size: 2rem;
    font-weight: 900;
    color: #1a1a2e;
    margin-bottom: 6px;
  }
  .subtitle {
    text-align: center;
    font-size: 1rem;
    color: #666;
    margin-bottom: 28px;
  }

  /* Progress bar */
  .progress-wrap {
    max-width: 560px;
    margin: 0 auto 24px;
  }
  .progress-label {
    font-size: 0.85rem;
    font-weight: 700;
    color: #888;
    margin-bottom: 6px;
    text-align: right;
  }
  .progress-bar-bg {
    background: #e0e0e0;
    border-radius: 99px;
    height: 12px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, #f7971e, #ffd200);
    transition: width 0.4s ease;
  }

  /* Card */
  .card {
    max-width: 560px;
    margin: 0 auto;
    background: white;
    border-radius: 24px;
    padding: 32px 28px 28px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.10);
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: var(--accent, #f7971e);
  }

  .category-badge {
    display: inline-block;
    background: var(--accent-light, #fff3e0);
    color: var(--accent-dark, #e65c00);
    font-size: 0.78rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    border-radius: 99px;
    padding: 4px 14px;
    margin-bottom: 16px;
  }

  .question-text {
    font-size: 1.2rem;
    font-weight: 800;
    color: #1a1a2e;
    line-height: 1.45;
    margin-bottom: 24px;
  }

  .answers {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .answer-btn {
    background: #f5f5f5;
    border: 2.5px solid transparent;
    border-radius: 14px;
    padding: 13px 18px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: #333;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .answer-btn:hover:not(:disabled) {
    background: #eee;
    border-color: var(--accent, #f7971e);
    transform: translateX(3px);
  }
  .answer-btn .letter {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: white;
    border: 2px solid #ccc;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem;
    font-weight: 900;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .answer-btn.correct {
    background: #e8f8e8;
    border-color: #2ecc71;
    color: #1a6e3a;
  }
  .answer-btn.correct .letter {
    background: #2ecc71;
    border-color: #2ecc71;
    color: white;
  }
  .answer-btn.wrong {
    background: #fde8e8;
    border-color: #e74c3c;
    color: #8b1c1c;
  }
  .answer-btn.wrong .letter {
    background: #e74c3c;
    border-color: #e74c3c;
    color: white;
  }
  .answer-btn.reveal-correct {
    background: #e8f8e8;
    border-color: #2ecc71;
    color: #1a6e3a;
  }
  .answer-btn:disabled { cursor: default; }

  /* Feedback */
  .feedback {
    margin-top: 18px;
    padding: 14px 18px;
    border-radius: 14px;
    font-size: 0.95rem;
    font-weight: 700;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.correct-fb { background: #e8f8e8; color: #1a6e3a; }
  .feedback.wrong-fb { background: #fde8e8; color: #8b1c1c; }

  .next-btn {
    margin-top: 20px;
    width: 100%;
    background: var(--accent, #f7971e);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 1.05rem;
    font-weight: 800;
    cursor: pointer;
    display: none;
    transition: opacity 0.15s, transform 0.1s;
  }
  .next-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .next-btn.show { display: block; }

  /* Score bar */
  .score-bar {
    max-width: 560px;
    margin: 20px auto 0;
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .score-dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #e0e0e0;
    transition: background 0.3s;
  }
  .score-dot.got { background: #2ecc71; }
  .score-dot.missed { background: #e74c3c; }

  /* Results screen */
  .results {
    display: none;
    max-width: 560px;
    margin: 0 auto;
    text-align: center;
  }
  .results.show { display: block; }
  .results-card {
    background: white;
    border-radius: 24px;
    padding: 40px 32px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.10);
  }
  .results-emoji { font-size: 4rem; margin-bottom: 12px; }
  .results-title { font-size: 1.8rem; font-weight: 900; color: #1a1a2e; margin-bottom: 8px; }
  .results-score { font-size: 3rem; font-weight: 900; color: #f7971e; margin: 16px 0; }
  .results-msg { font-size: 1rem; color: #555; font-weight: 600; line-height: 1.6; margin-bottom: 28px; }
  .restart-btn {
    background: #1a1a2e;
    color: white;
    border: none;
    border-radius: 14px;
    padding: 14px 32px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .restart-btn:hover { opacity: 0.85; }

  .quiz-wrap { display: block; }

  @keyframes pop-in {
    from { transform: scale(0.92); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }
  .card { animation: pop-in 0.25s ease; }
</style>
</head>
<body>

<h1>🏙️ Leipzig-Quiz</h1>
<p class="subtitle">Wie viel weißt du über Leipzigs Industrie?</p>

<div class="progress-wrap">
  <div class="progress-label" id="progress-label">Frage 1 von 12</div>
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-bar" style="width:0%"></div></div>
</div>

<div class="quiz-wrap" id="quiz-wrap">
  <div class="card" id="card">
    <div class="category-badge" id="category-badge">Kategorie</div>
    <div class="question-text" id="question-text">Frage...</div>
    <div class="answers" id="answers"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn">Weiter →</button>
  </div>
  <div class="score-bar" id="score-bar"></div>
</div>

<div class="results" id="results">
  <div class="results-card">
    <div class="results-emoji" id="results-emoji">🎉</div>
    <div class="results-title">Quiz geschafft!</div>
    <div class="results-score" id="results-score">0 / 12</div>
    <div class="results-msg" id="results-msg"></div>
    <button class="restart-btn" onclick="restart()">🔄 Nochmal spielen</button>
  </div>
</div>

<script>
const questions = [
  // ── Baumwollspinnerei ──
  {
    category: "🏭 Baumwollspinnerei",
    accent: "#e67e22", accentLight: "#fef0e0", accentDark: "#b84d00",
    q: "In welchem Jahr wurde die Baumwollspinnerei in Leipzig gegründet?",
    answers: ["1750", "1884", "1920", "1960"],
    correct: 1,
    feedback: "Richtig! 1884 wurde die Spinnerei in Leipzig-Plagwitz eröffnet."
  },
  {
    category: "🏭 Baumwollspinnerei",
    accent: "#e67e22", accentLight: "#fef0e0", accentDark: "#b84d00",
    q: "Wie viele Menschen arbeiteten dort um das Jahr 1900?",
    answers: ["Etwa 50", "Etwa 200", "Über 2 000", "Über 10 000"],
    correct: 2,
    feedback: "Genau! Über 2 000 Menschen arbeiteten damals in der Spinnerei."
  },
  {
    category: "🏭 Baumwollspinnerei",
    accent: "#e67e22", accentLight: "#fef0e0", accentDark: "#b84d00",
    q: "Was ist die Baumwollspinnerei heute?",
    answers: ["Ein Einkaufszentrum", "Ein Krankenhaus", "Ein Kunst- und Kulturzentrum", "Eine neue Fabrik"],
    correct: 2,
    feedback: "Richtig! Heute gibt es dort Ateliers, Galerien und Cafés."
  },
  {
    category: "🏭 Baumwollspinnerei",
    accent: "#e67e22", accentLight: "#fef0e0", accentDark: "#b84d00",
    q: "In welchem Stadtteil von Leipzig liegt die Baumwollspinnerei?",
    answers: ["Gohlis", "Plagwitz", "Connewitz", "Reudnitz"],
    correct: 1,
    feedback: "Richtig! Die Spinnerei liegt in Leipzig-Plagwitz, im Westen der Stadt."
  },
  // ── Buchindustrie ──
  {
    category: "📚 Buchindustrie",
    accent: "#27ae60", accentLight: "#e8f8ef", accentDark: "#1a6e3a",
    q: "Was erschien 1650 in Leipzig zum ersten Mal?",
    answers: ["Das erste Schulbuch", "Eine der ersten Tageszeitungen der Welt", "Der erste Atlas", "Das erste Wörterbuch"],
    correct: 1,
    feedback: "Genau! Eine der ersten Tageszeitungen der Welt wurde 1650 in Leipzig gedruckt."
  },
  {
    category: "📚 Buchindustrie",
    accent: "#27ae60", accentLight: "#e8f8ef", accentDark: "#1a6e3a",
    q: "Wie viele Menschen arbeiteten um 1900 in Leipzig in der Buchbranche?",
    answers: ["Etwa 500", "Etwa 5 000", "Über 30 000", "Über 100 000"],
    correct: 2,
    feedback: "Richtig! Über 30 000 Menschen arbeiteten damals in Leipzig mit Büchern."
  },
  {
    category: "📚 Buchindustrie",
    accent: "#27ae60", accentLight: "#e8f8ef", accentDark: "#1a6e3a",
    q: "Was passierte nach 1945 mit vielen Leipziger Verlagen?",
    answers: ["Sie wurden größer", "Sie zogen in den Westen Deutschlands", "Sie druckten mehr Bücher", "Nichts veränderte sich"],
    correct: 1,
    feedback: "Richtig! Viele Verlage zogen nach dem Zweiten Weltkrieg in den Westen."
  },
  {
    category: "📚 Buchindustrie",
    accent: "#27ae60", accentLight: "#e8f8ef", accentDark: "#1a6e3a",
    q: "Wie viele Besucher kommen heute jährlich zur Leipziger Buchmesse?",
    answers: ["Etwa 1 000", "Etwa 10 000", "Über 100 000", "Über 1 Million"],
    correct: 2,
    feedback: "Genau! Jedes Frühjahr kommen über 100 000 Besucher zur Buchmesse."
  },
  // ── Flughafen ──
  {
    category: "✈️ Flughafen Leipzig/Halle",
    accent: "#2980b9", accentLight: "#e8f2fb", accentDark: "#1a5276",
    q: "Welches Unternehmen eröffnete 2008 seinen Europa-Hub am Flughafen?",
    answers: ["Amazon", "DHL", "Lufthansa", "FedEx"],
    correct: 1,
    feedback: "Richtig! DHL eröffnete 2008 seinen großen Europa-Hub in Leipzig."
  },
  {
    category: "✈️ Flughafen Leipzig/Halle",
    accent: "#2980b9", accentLight: "#e8f2fb", accentDark: "#1a5276",
    q: "Wann landen die meisten Frachtflugzeuge in Leipzig?",
    answers: ["Morgens zwischen 6 und 12 Uhr", "Mittags zwischen 12 und 18 Uhr", "Nachts zwischen 22 und 6 Uhr", "Immer gleichmäßig verteilt"],
    correct: 2,
    feedback: "Genau! Die meisten Frachtmaschinen landen nachts, damit die Pakete früh morgens weitergefahren werden können."
  },
  {
    category: "✈️ Flughafen Leipzig/Halle",
    accent: "#2980b9", accentLight: "#e8f2fb", accentDark: "#1a5276",
    q: "In wie viele Länder verschickt DHL von Leipzig aus Pakete?",
    answers: ["Etwa 20 Länder", "Etwa 50 Länder", "Über 100 Länder", "Über 220 Länder"],
    correct: 3,
    feedback: "Beeindruckend! DHL beliefert von Leipzig aus über 220 Länder."
  },
  {
    category: "✈️ Flughafen Leipzig/Halle",
    accent: "#2980b9", accentLight: "#e8f2fb", accentDark: "#1a5276",
    q: "Wie lang ist eine der Landebahnen am Flughafen Leipzig/Halle?",
    answers: ["1,2 Kilometer", "2,0 Kilometer", "3,6 Kilometer", "5,0 Kilometer"],
    correct: 2,
    feedback: "Richtig! Die Landebahn ist 3,6 km lang – das sind ungefähr 50 Schulbusse hintereinander!"
  },
];

let current = 0;
let score = 0;
let answered = false;
const results = [];

const letters = ['A', 'B', 'C', 'D'];

function render() {
  const q = questions[current];
  const card = document.getElementById('card');

  // Accent colors
  card.style.setProperty('--accent', q.accent);
  card.style.setProperty('--accent-light', q.accentLight);
  card.style.setProperty('--accent-dark', q.accentDark);

  document.getElementById('category-badge').textContent = q.category;
  document.getElementById('category-badge').style.background = q.accentLight;
  document.getElementById('category-badge').style.color = q.accentDark;
  document.getElementById('question-text').textContent = q.q;

  // Progress
  const pct = (current / questions.length) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `Frage ${current + 1} von ${questions.length}`;

  // Answers
  const answersEl = document.getElementById('answers');
  answersEl.innerHTML = '';
  q.answers.forEach((a, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.innerHTML = `<span class="letter">${letters[i]}</span>${a}`;
    btn.onclick = () => selectAnswer(i);
    answersEl.appendChild(btn);
  });

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').textContent = '';
  document.getElementById('next-btn').className = 'next-btn';
  document.getElementById('next-btn').style.background = q.accent;

  answered = false;

  // Re-trigger animation
  card.style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = 'pop-in 0.25s ease';

  updateScoreBar();
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;

  const q = questions[current];
  const btns = document.querySelectorAll('.answer-btn');
  const fb = document.getElementById('feedback');

  btns.forEach(b => b.disabled = true);

  if (idx === q.correct) {
    btns[idx].classList.add('correct');
    fb.textContent = '✅ ' + q.feedback;
    fb.className = 'feedback correct-fb show';
    score++;
    results.push(true);
  } else {
    btns[idx].classList.add('wrong');
    btns[q.correct].classList.add('reveal-correct');
    fb.textContent = '❌ Nicht ganz! ' + q.feedback;
    fb.className = 'feedback wrong-fb show';
    results.push(false);
  }

  document.getElementById('next-btn').classList.add('show');
  document.getElementById('next-btn').textContent = current < questions.length - 1 ? 'Weiter →' : 'Ergebnis sehen 🎉';
  updateScoreBar();
}

function updateScoreBar() {
  const bar = document.getElementById('score-bar');
  bar.innerHTML = '';
  questions.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'score-dot';
    if (i < results.length) dot.classList.add(results[i] ? 'got' : 'missed');
    bar.appendChild(dot);
  });
}

document.getElementById('next-btn').onclick = () => {
  current++;
  if (current >= questions.length) {
    showResults();
  } else {
    render();
  }
};

function showResults() {
  document.getElementById('quiz-wrap').style.display = 'none';
  document.getElementById('results').classList.add('show');
  document.getElementById('progress-bar').style.width = '100%';
  document.getElementById('progress-label').textContent = 'Fertig!';

  const pct = score / questions.length;
  let emoji, msg;
  if (pct === 1) {
    emoji = '🏆'; msg = 'Perfekt! Du hast alle Fragen richtig beantwortet. Du bist ein echter Leipzig-Experte!';
  } else if (pct >= 0.75) {
    emoji = '🌟'; msg = 'Super gemacht! Du weißt schon sehr viel über Leipzigs Industrie.';
  } else if (pct >= 0.5) {
    emoji = '👍'; msg = 'Gut! Du hast mehr als die Hälfte richtig. Lies die Infotexte nochmal – dann klappt es noch besser!';
  } else {
    emoji = '📖'; msg = 'Lies dir die Infotexte nochmal durch und versuche es dann nochmal. Du schaffst das!';
  }

  document.getElementById('results-emoji').textContent = emoji;
  document.getElementById('results-score').textContent = `${score} / ${questions.length}`;
  document.getElementById('results-msg').textContent = msg;
}

function restart() {
  current = 0; score = 0; results.length = 0;
  document.getElementById('quiz-wrap').style.display = 'block';
  document.getElementById('results').classList.remove('show');
  render();
}

render();
</script>
</body>
</html>
